spring.application.name=Finance Data Processing and Access Control Backend

# Server Configuration
server.port=8081
server.servlet.context-path=/

# H2 In-Memory Database Configuration (for development/testing)
spring.datasource.url=jdbc:h2:mem:finance_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (accessible at /h2-console for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=your_jwt_secret_key_here_change_in_production_minimum_256_bits
jwt.expiration=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.show-actuator=false
springdoc.swagger-ui.csrf.enabled=false

